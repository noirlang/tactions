name: Build and release commit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  metadata:
    name: Commit metadata
    runs-on: ubuntu-24.04
    outputs:
      asset_suffix: ${{ steps.commit.outputs.asset_suffix }}
      release_title: ${{ steps.commit.outputs.release_title }}
      short_sha: ${{ steps.commit.outputs.short_sha }}
      tag: ${{ steps.commit.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create commit names
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          subject="$(git log -1 --pretty=%s)"
          short_sha="${GITHUB_SHA:0:12}"
          ascii_subject="$(printf '%s' "$subject" \
            | iconv -f UTF-8 -t ASCII//TRANSLIT 2>/dev/null || true)"
          slug="$(printf '%s' "$ascii_subject" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g; s/-+/-/g' \
            | cut -c1-56)"
          if [[ -z "$slug" ]]; then
            slug="commit"
          fi
          echo "asset_suffix=${slug}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "release_title=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=commit-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  quality:
    name: Tests and static checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Check JavaScript syntax
        run: node --check src/main.js

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

  linux-packages:
    name: AppImage, DEB, RPM
    needs:
      - metadata
      - quality
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build in Ubuntu 22.04 container
        shell: bash
        run: |
          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            ubuntu:22.04 \
            bash ./scripts/ci-build-linux.sh

      - name: Name Linux assets from commit
        env:
          ASSET_SUFFIX: ${{ needs.metadata.outputs.asset_suffix }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for f in dist/tactions-linux-x64.*; do
            [ -f "$f" ] || continue
            case "$f" in
              *.AppImage)    cp "$f" "release-assets/tactions-${ASSET_SUFFIX}-linux-x64.AppImage" ;;
              *.deb)         cp "$f" "release-assets/tactions-${ASSET_SUFFIX}-linux-x64.deb" ;;
              *.rpm)         cp "$f" "release-assets/tactions-${ASSET_SUFFIX}-linux-x64.rpm" ;;
              *.pkg.tar.zst) cp "$f" "release-assets/tactions-${ASSET_SUFFIX}-linux-x64.pkg.tar.zst" ;;
            esac
          done

      - name: Upload Linux packages
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages-${{ needs.metadata.outputs.short_sha }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30

  windows-msi:
    name: Windows GUI and MSI
    needs:
      - metadata
      - quality
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install WiX Toolset 3.14
        shell: pwsh
        run: |
          $Archive = Join-Path $env:RUNNER_TEMP "wix314-binaries.zip"
          $WixDir = Join-Path $env:RUNNER_TEMP "wix314"
          Invoke-WebRequest `
            -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" `
            -OutFile $Archive
          Expand-Archive $Archive -DestinationPath $WixDir -Force
          $WixDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI with Tauri
        shell: pwsh
        run: |
          npm install
          npx tauri build --bundles msi

      - name: Verify GUI subsystem and static runtime
        shell: pwsh
        run: |
          $VsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $VsPath = & $VsWhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $VcVars = Join-Path $VsPath "VC\Auxiliary\Build\vcvars64.bat"
          cmd /c "`"$VcVars`" && dumpbin /HEADERS src-tauri\target\release\tactions.exe > headers.txt && dumpbin /DEPENDENTS src-tauri\target\release\tactions.exe > dependents.txt"
          if ($LASTEXITCODE -ne 0) { throw "dumpbin verification failed" }
          $Headers = Get-Content headers.txt -Raw
          $Dependencies = Get-Content dependents.txt -Raw
          Write-Host $Headers
          Write-Host $Dependencies
          if ($Headers -notmatch 'subsystem \(Windows GUI\)') {
            throw "tactions.exe was not linked as a Windows GUI application"
          }
          if ($Dependencies -match 'VCRUNTIME|MSVCP') {
            throw "tactions.exe still depends on the external Visual C++ runtime"
          }

      - name: Name Windows asset from commit
        env:
          ASSET_SUFFIX: ${{ needs.metadata.outputs.asset_suffix }}
        shell: pwsh
        run: |
          New-Item release-assets -ItemType Directory -Force | Out-Null
          $msi = Get-ChildItem -Path "src-tauri\target\release\bundle\msi\*.msi" | Select-Object -First 1
          if (-not $msi) { throw "MSI not found in bundle/msi/" }
          Copy-Item $msi.FullName "release-assets\tactions-$env:ASSET_SUFFIX-windows-x64.msi"

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v7
        with:
          name: windows-msi-${{ needs.metadata.outputs.short_sha }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish commit prerelease
    if: github.event_name == 'push'
    needs:
      - metadata
      - linux-packages
      - windows-msi
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Create checksums and release notes
        env:
          ASSET_SUFFIX: ${{ needs.metadata.outputs.asset_suffix }}
          RELEASE_TITLE: ${{ needs.metadata.outputs.release_title }}
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum tactions-* \
            > "tactions-${ASSET_SUFFIX}-SHA256SUMS.txt"
          cd ..
          cat > release-notes.md <<EOF
          Automated development release for **${RELEASE_TITLE}**.

          Built from \`${GITHUB_SHA}\` on \`${GITHUB_REF_NAME}\`.

          Packages:
          - Linux AppImage
          - Debian/Ubuntu DEB
          - Fedora/RHEL RPM
          - Arch Linux package
          - Windows x64 MSI

          This is an unsigned prerelease generated from a development commit.
          EOF

      - name: Create or update commit release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
          RELEASE_TITLE: ${{ needs.metadata.outputs.release_title }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --prerelease
            gh release upload "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --prerelease
          fi
